<svg width="280" height="280" viewBox="0 0 280 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgRingBlue" x1="35" y1="35" x2="245" y2="245" gradientUnits="userSpaceOnUse">
      <stop stop-color="#57C6FF" />
      <stop offset="1" stop-color="#1B5BBA" />
    </linearGradient>
    <linearGradient id="bgRingRed" x1="54" y1="54" x2="226" y2="226" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF5E57" />
      <stop offset="1" stop-color="#C40F1A" />
    </linearGradient>
    <linearGradient id="plateGradient" x1="16" y1="140" x2="264" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07080C" />
      <stop offset="0.45" stop-color="#010205" />
      <stop offset="1" stop-color="#111318" />
    </linearGradient>
    <filter id="softGlow" x="-20" y="-20" width="320" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur" />
