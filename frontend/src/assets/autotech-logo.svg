  <circle cx="140" cy="140" r="104" fill="none" stroke="url(#bgRingBlue)" stroke-width="26" stroke-linecap="round" stroke-dasharray="426 98" transform="rotate(-50 140 140)" />
  <circle cx="140" cy="140" r="72" fill="none" stroke="url(#bgRingRed)" stroke-width="24" stroke-linecap="round" />
  <circle cx="140" cy="140" r="48" fill="#090B10" stroke="#1D212A" stroke-width="4" />

  <g filter="url(#softGlow)">
    <path d="M18 126H262L248 158H8L18 126Z" fill="url(#plateGradient)" stroke="#E31B23" stroke-width="2" />
    <text x="140" y="152" text-anchor="middle" fill="#FFFFFF" font-family="Rajdhani, Segoe UI, sans-serif" font-weight="700" font-size="44" letter-spacing="2">
